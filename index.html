<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos PAPA MIKE</title>
    <!-- Biblioteca para gerar Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
        <style>
            /* Logo: evitar esticamento — largura limitada, altura automática */
            .logo-wrapper{display:flex;align-items:center;justify-content:center;padding:6px 0}
            /* Ícone pequeno */
            .logo-img{width:48px;max-width:48px;height:auto;max-height:48px;object-fit:contain;display:block}
            /* Logo fora do card (tamanho solicitado) */
            .logo-outside{width:160px;height:160px;object-fit:contain;display:block}

            /* Fallback imediato para as classes Tailwind do <body> */
            body{
                min-height:100vh;
                color:#f1f5f9; /* text-slate-100 */
                padding:1rem; /* p-4 */
                display:flex;
                flex-direction:column;
                align-items:center;
                justify-content:flex-start;
                background-color:#0f1724; /* bg-slate-950-ish */
                font-family: 'DM Sans', sans-serif;
            }
            @media (min-width: 768px){
                body{padding-top:2rem;padding-bottom:2rem} /* md:py-8 */
            }
            ::selection{background:#10b981;color:#0f1724} /* selection:bg-emerald-500 selection:text-slate-950 */
        </style>

</head>
<body class="min-h-screen text-slate-100 p-4 md:py-8 flex flex-col items-center justify-start bg-slate-950 font-sans selection:bg-emerald-500 selection:text-slate-950">
    <main class="w-full max-w-xl">
        <div class="flex justify-center mb-4">
            <img src="img/papamike logo.png" alt="Logo PAPA MIKE" class="logo-outside rounded-3xl shadow-2xl border border-white/10">
        </div>
        <div class="rounded-3xl p-6 shadow-2xl border border-white/10 panel-bg">
            
            <div class="flex justify-between items-center mb-6">
                
                <h2 class="font-bold text-white text-2xl">Lista de Pedidos</h2>
                <div class="flex items-center gap-2">
                    <button onclick="refreshProducts()" class="text-gray-400 hover:text-white transition-colors text-sm">Atualizar produtos</button>
                    <button onclick="openAdmin()" class="text-gray-400 hover:text-white transition-colors" title="Abrir configurações" aria-label="Abrir configurações">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
                    </button>
                </div>
            </div>
            <div id="supabase-status" class="mb-2 text-sm text-gray-300 hidden"></div>
            
            <!-- Telefone Contato (limitado a 11 dígitos) -->
            <div class="mb-4">
                <label class="block mb-1 font-medium text-gray-300 text-xs uppercase">Telefone do Cliente (Obrigatório)</label>
                <input id="contact-phone" class="w-full rounded-lg px-3 py-2 bg-black/40 text-white border border-white/20 focus:ring-2 focus:ring-gray-400 outline-none" type="tel" inputmode="numeric" pattern="\\d{11}" maxlength="11" placeholder="(99) 99999-9999">
            </div>

            <form id="order-form" class="space-y-4">
                <div>
                    <label class="block mb-1 font-medium text-white text-xs uppercase">Escrita da Estampa</label>
                    <input id="input-name" class="w-full rounded-lg px-3 py-2 border border-white/30 bg-white/10 text-white placeholder-white/40 focus:ring-2 focus:ring-gray-400 outline-none" type="text" placeholder="Nome ou frase da estampa">
                </div>

                <div>
                    <label for="select-product" class="block mb-1 font-medium text-white text-xs uppercase">Selecione o Produto</label>
                    <select id="select-product" class="w-full rounded-lg px-3 py-2 border border-white/30 bg-gray-800 text-white focus:ring-2 focus:ring-gray-400 outline-none">
                        <!-- Produtos via JS -->
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="select-size" class="block mb-1 font-medium text-white text-xs uppercase">Tamanho</label>
                        <select id="select-size" class="w-full rounded-lg px-3 py-2 border border-white/30 bg-gray-800 text-white focus:ring-2 focus:ring-gray-400 outline-none">
                            <option>P</option><option>M</option><option>G</option><option>GG</option><option>G1</option><option>G2</option>
                        </select>
                    </div>
                    <div>
                        <label for="input-qty" class="block mb-1 font-medium text-white text-xs uppercase">Qtd</label>
                        <input id="input-qty" type="number" value="1" min="1" class="w-full rounded-lg px-3 py-2 border border-white/30 bg-white/10 text-white outline-none">
                    </div>
                </div>

                <button type="button" onclick="addToList()" class="w-full btn-hover bg-gray-200 text-black font-bold py-2 rounded-lg">ADICIONAR À LISTA</button>
            </form>

            <div id="list-container" class="mt-6 space-y-2 max-h-60 overflow-y-auto pr-1"></div>

            <div class="mt-6 border-t border-white/10 pt-4">
                <div id="total-price" class="text-right text-white font-bold mb-4 text-xl">Total: R$ 0,00</div>
                <button type="button" class="btn-hover w-full rounded-lg py-3 font-bold text-black bg-gradient-to-r from-green-400 to-green-600 shadow-lg" onclick="preSendCheck()">
                    GERAR PLANILHA E ENVIAR
                </button>
            </div>
        </div>
    </main>

    <!-- Modal Admin -->
    <div id="modal-admin" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
      <div class="w-full max-w-xl max-h-[90vh] overflow-hidden rounded-2xl border border-white/20 bg-gray-900 shadow-2xl">
        <div class="h-full overflow-y-auto p-6">
          <h2 class="text-white font-bold text-xl mb-4 text-center">Área Administrativa</h2>
          <div id="admin-login-pane" class="space-y-3">
            <input id="admin-password" type="password" class="w-full rounded px-3 py-2 bg-gray-800 text-white border border-white/10" placeholder="Senha administrativa">
            <div id="admin-login-error" class="text-xs text-red-400 hidden"></div>
            <button onclick="loginAdmin()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Entrar</button>
          </div>
          <div id="admin-content-pane" class="hidden">
            <div id="admin-mode" class="mb-4 text-xs text-gray-400"></div>

            <div role="tablist" class="mb-4 flex flex-wrap gap-2 rounded-full bg-white/5 p-1">
              <button id="admin-tab-products" type="button" role="tab" aria-selected="true" class="px-4 py-2 rounded-full text-blue-500 border-b-2 border-blue-500 transition-colors">Produtos</button>
              <button id="admin-tab-security" type="button" role="tab" aria-selected="false" class="px-4 py-2 rounded-full text-gray-400 hover:text-white transition-colors">Segurança</button>
            </div>

            <div id="admin-tab-products-panel" class="space-y-3">
              <div class="space-y-3">
                <input id="new-prod-name" class="w-full rounded px-3 py-2 bg-gray-800 text-white border border-white/10" placeholder="Nome do Produto">
                <input id="new-prod-price" type="number" class="w-full rounded px-3 py-2 bg-gray-800 text-white border border-white/10" placeholder="Preço (Ex: 55.00)">
                <button onclick="saveProduct()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Adicionar Produto</button>
              </div>

              <div class="mt-4 rounded-lg border border-white/10 bg-white/5 p-3">
                <div class="text-sm text-gray-300 font-semibold mb-2">Produtos cadastrados</div>
                <div id="admin-prod-list" class="max-h-40 overflow-y-auto text-sm text-white space-y-2"></div>
              </div>
            </div>

                        <div id="admin-tab-security-panel" class="hidden space-y-4">
                            <div class="space-y-3 rounded-lg border border-white/10 bg-white/5 p-3">
                                <div class="text-sm text-white font-semibold">Segurança</div>
                                <div class="text-xs text-gray-300">Altere a senha administrativa</div>
                                <input id="current-pass" type="password" class="w-full rounded px-3 py-2 bg-gray-800 text-white border border-white/10" placeholder="Senha atual">
                                <input id="new-pass" type="password" class="w-full rounded px-3 py-2 bg-gray-800 text-white border border-white/10" placeholder="Nova senha">
                                <input id="confirm-pass" type="password" class="w-full rounded px-3 py-2 bg-gray-800 text-white border border-white/10" placeholder="Confirme a nova senha">
                                <button onclick="changeAdminPassword()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Alterar senha</button>
                            </div>

                            <button onclick="logoutAdmin()" class="w-full mt-4 bg-red-600 text-white py-2 rounded font-bold">Sair</button>
                        </div>
                    </div>
                    <button onclick="closeAdmin()" class="w-full mt-4 text-gray-400 text-sm">Fechar</button>
                </div>
            </div>

        <script src="js/supabase-config.js"></script>
        <script src="js/list.js"></script>
</body>
</html>
